
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF converter · web tool</title>
  <!-- jsPDF library (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 20, 30, 0.2), 0 8px 16px rgba(0,0,0,0.05);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.2s ease;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      color: #0b2b3b;
      margin-bottom: 0.3rem;
    }

    .subhead {
      color: #2b5c6e;
      font-weight: 400;
      font-size: 1rem;
      margin-bottom: 2rem;
      border-left: 4px solid #3d8c9c;
      padding-left: 1rem;
      background: rgba(61, 140, 156, 0.06);
      border-radius: 0 8px 8px 0;
    }

    .drop-zone {
      background: rgba(255, 255, 255, 0.5);
      border: 2px dashed #8bb9c9;
      border-radius: 2rem;
      padding: 2.8rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 1.8rem;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }

    .drop-zone:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #3d8c9c;
      box-shadow: 0 8px 20px rgba(40, 100, 120, 0.08);
    }

    .drop-zone.dragover {
      background: rgba(61, 140, 156, 0.08);
      border-color: #1f6a7a;
      transform: scale(1.01);
    }

    .drop-zone svg {
      width: 56px;
      height: 56px;
      stroke: #2b5c6e;
      stroke-width: 1.5;
      margin-bottom: 0.8rem;
    }

    .drop-zone p {
      color: #1e4d5e;
      font-weight: 500;
      font-size: 1.2rem;
    }

    .drop-zone span {
      color: #4a7b8b;
      font-size: 0.9rem;
      display: block;
      margin-top: 0.3rem;
    }

    .file-input {
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.8rem;
      margin: 1.8rem 0 1.8rem;
      max-height: 260px;
      overflow-y: auto;
      padding: 0.2rem 0.1rem;
    }

    .preview-item {
      position: relative;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(140, 180, 190, 0.15);
      overflow: hidden;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
    }

    .preview-item img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      padding: 4px;
      display: block;
    }

    .preview-item .badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: rgba(0, 20, 30, 0.7);
      backdrop-filter: blur(2px);
      color: white;
      font-size: 0.6rem;
      padding: 0.1rem 0.5rem;
      border-radius: 30px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .empty-preview {
      color: #6a8f9c;
      text-align: center;
      padding: 1.2rem 0;
      font-style: italic;
      font-size: 0.95rem;
      background: rgba(200, 220, 230, 0.2);
      border-radius: 40px;
      grid-column: 1 / -1;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.2rem;
      border-top: 1px solid rgba(100, 150, 165, 0.15);
      padding-top: 1.8rem;
    }

    .file-info {
      color: #1e4d5e;
      font-size: 0.9rem;
      background: rgba(200, 225, 235, 0.3);
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      font-weight: 450;
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      background: white;
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-weight: 550;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 8px rgba(0, 20, 30, 0.04);
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid rgba(130, 170, 185, 0.2);
      color: #124252;
      background: rgba(255, 255, 255, 0.7);
    }

    .btn-primary {
      background: #1e5d70;
      border: 1px solid #1a5060;
      color: white;
      box-shadow: 0 8px 16px rgba(20, 80, 100, 0.2);
    }

    .btn-primary:hover {
      background: #124b5c;
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(20, 70, 90, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #b0ccd8;
    }

    .btn-secondary:hover {
      background: rgba(200, 220, 230, 0.4);
      border-color: #7aa5b5;
    }

    .btn-danger {
      background: rgba(190, 70, 70, 0.06);
      border-color: #d6a5a5;
      color: #914747;
    }

    .btn-danger:hover {
      background: rgba(190, 70, 70, 0.12);
      border-color: #b56f6f;
    }

    .footer-credit {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.75rem;
      color: #4b798a;
      opacity: 0.7;
      border-top: 1px solid rgba(130, 170, 185, 0.1);
      padding-top: 1.2rem;
    }

    @media (max-width: 480px) {
      .card { padding: 1.8rem 1rem; }
      h1 { font-size: 1.8rem; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .btn-group { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1d5b6e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="2.5" />
      <path d="M8 2v4M16 2v4M2 10h20M8 16l2 2 4-4" />
      <circle cx="17.5" cy="17.5" r="1.5" fill="#1d5b6e" stroke="none" />
    </svg>
    Image → PDF
  </h1>
  <div class="subhead">
    Drop images or click to upload · each image becomes a page
  </div>

  <!-- drop zone -->
  <div class="drop-zone" id="dropZone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
    <p>Drag & drop images here</p>
    <span>or click to browse · PNG, JPG, WEBP, GIF, BMP</span>
    <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
  </div>

  <!-- preview grid -->
  <div class="preview-grid" id="previewGrid">
    <div class="empty-preview">✨ no images added yet</div>
  </div>

  <!-- action bar -->
  <div class="action-bar">
    <span class="file-info" id="fileInfo">0 images</span>
    <div class="btn-group">
      <button class="btn btn-secondary" id="clearBtn" title="remove all images">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 4h12M5.5 4v9a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V4M6.5 7v5M9.5 7v5" />
        </svg>
        Clear
      </button>
      <button class="btn btn-primary" id="convertBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="12" y1="18" x2="12" y2="12" />
          <polyline points="9 15 12 18 15 15" />
        </svg>
        Convert &amp; download PDF
      </button>
    </div>
  </div>
  <div class="footer-credit">
    ⚡ client-side · your images stay private
  </div>
</div>

<script>
  (function(){
    // ---- state ----
    let imageFiles = [];           // stores File objects
    const previewGrid = document.getElementById('previewGrid');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const fileInfo = document.getElementById('fileInfo');

    // ---- helpers ----
    function updateUI() {
      const count = imageFiles.length;
      fileInfo.textContent = count + ' image' + (count !== 1 ? 's' : '');
      convertBtn.disabled = (count === 0);

      // render previews
      if (count === 0) {
        previewGrid.innerHTML = `<div class="empty-preview">📷 no images added yet</div>`;
        return;
      }

      // keep preview grid, rebuild
      previewGrid.innerHTML = '';
      imageFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        const img = document.createElement('img');
        // use object URL for preview
        const objectUrl = URL.createObjectURL(file);
        img.src = objectUrl;
        img.alt = file.name;
        img.loading = 'lazy';
        // release object URL when image loads (to avoid memory leak)
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
        };
        item.appendChild(img);

        // small badge with file extension or index
        const badge = document.createElement('span');
        badge.className = 'badge';
        const ext = file.name.split('.').pop().toUpperCase().slice(0,4);
        badge.textContent = ext || 'IMG';
        item.appendChild(badge);

        // optional remove on double-click (convenience)
        item.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          removeImageAtIndex(index);
        });

        previewGrid.appendChild(item);
      });
    }

    function removeImageAtIndex(index) {
      if (index >= 0 && index < imageFiles.length) {
        imageFiles.splice(index, 1);
        updateUI();
      }
    }

    function addFiles(fileList) {
      if (!fileList || fileList.length === 0) return;
      let added = 0;
      for (let i = 0; i < fileList.length; i++) {
        const file = fileList[i];
        if (file && file.type.startsWith('image/')) {
          imageFiles.push(file);
          added++;
        }
      }
      if (added > 0) {
        updateUI();
      } else {
        // subtle feedback if no valid images
        alert('No valid image files found. Please select PNG, JPG, WEBP, GIF, BMP etc.');
      }
    }

    // ---- event listeners ----
    fileInput.addEventListener('change', (e) => {
      addFiles(e.target.files);
      fileInput.value = ''; // allow re-upload same files
    });

    // drag & drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files) {
        addFiles(e.dataTransfer.files);
      }
    });

    dropZone.addEventListener('click', () => {
      fileInput.click();
    });

    // clear all
    clearBtn.addEventListener('click', () => {
      if (imageFiles.length === 0) return;
      if (confirm('Remove all images?')) {
        imageFiles = [];
        updateUI();
      }
    });

    // ---- conversion (PDF) ----
    convertBtn.addEventListener('click', async () => {
      if (imageFiles.length === 0) {
        alert('Add at least one image first.');
        return;
      }

      // disable button during conversion
      convertBtn.disabled = true;
      convertBtn.textContent = '⏳ generating…';

      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'px',
          format: 'a4',          // we'll scale images to fit A4
          compress: true
        });

        // A4 dimensions in pixels (approx 595 x 842 at 72dpi)
        const PDF_WIDTH = 595;
        const PDF_HEIGHT = 842;

        for (let i = 0; i < imageFiles.length; i++) {
          const file = imageFiles[i];
          // load image as dataUrl
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = (err) => reject(err);
            reader.readAsDataURL(file);
          });

          // create image object to get natural dimensions
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = () => resolve();
            img.onerror = () => reject(new Error('Failed to load image: ' + file.name));
            img.src = dataUrl;
          });

          // calculate aspect ratio and fit inside A4 (preserve aspect)
          let imgW = img.naturalWidth || 800;
          let imgH = img.naturalHeight || 600;
          let ratio = Math.min(PDF_WIDTH / imgW, PDF_HEIGHT / imgH);
          let finalW = imgW * ratio;
          let finalH = imgH * ratio;

          // center on page (optional)
          const xOffset = (PDF_WIDTH - finalW) / 2;
          const yOffset = (PDF_HEIGHT - finalH) / 2;

          // if not first page, add a new page
          if (i > 0) {
            pdf.addPage();
          }

          // add image to PDF (format: dataUrl, format, x, y, width, height, alias)
          pdf.addImage(dataUrl, 'JPEG', xOffset, yOffset, finalW, finalH, undefined, 'FAST');
        }

        // generate PDF and trigger download
        const pdfBlob = pdf.output('blob');
        const link = document.createElement('a');
        link.href = URL.createObjectURL(pdfBlob);
        link.download = 'converted-images.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);

      } catch (error) {
        console.error('Conversion error:', error);
        alert('Something went wrong while generating the PDF. Please try again.\n' + error.message);
      } finally {
        convertBtn.disabled = false;
        convertBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="12" y1="18" x2="12" y2="12" />
            <polyline points="9 15 12 18 15 15" />
          </svg>
          Convert &amp; download PDF
        `;
      }
    });

    // ---- extra: keyboard shortcut to clear (ESC) ----
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && imageFiles.length > 0) {
        if (confirm('Clear all images?')) {
          imageFiles = [];
          updateUI();
        }
      }
    });

    // initial UI
    updateUI();
  })();
</script>
</body>
</html>
